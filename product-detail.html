<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <title>Product Detail</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/color-options.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .model-container {
            background-color: lightgrey;
        }

        .vto-container {
            display: none;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 5rem;
        }

        .btn-container button {
            width: 10rem;
            height: 3rem;
            margin: 1rem;

            border-radius: 10px;
            border: 1px solid transparent;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            background-color: #9d1c20;
            color: white;
        }

        .btn-container button:hover {
            border: 1px solid #9d1c20;
            background-color: white;
            color: #9d1c20;
            cursor: pointer;
        }

        .top-btn {
            position: absolute;
            margin-top: 1rem;
            margin-left: 1rem;
            z-index: 9999;
            background-color: white;
            border: 1px solid #9d1c20;
            padding: 0.5rem;
            border-radius: 10px;
            text-align: center;
        }

        .top-btn ul {
            margin: 0;
        }

        @media (max-width: 450px) {
            .btn-container button {
                width: 7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- <a href="" class="back-icon"><i data-feather="arrow-left"></i></a> -->
        <div class="top-btn">
            <h6>Switch Color</h6>
            <ul class="color-options">
                <li data-color="black" id="colblack" title="Black"><span class="color black"></span></li>
                <li data-color="white" id="colwhite" title="No Color"><span class="color white"></span></li>
            </ul>
        </div>
        <div class="model-container">
            <model-viewer 
                id="mviewer"
                src="assets/womenglasses-new.glb"
                alt="Model 3D"
                auto-rotate
                camera-controls
                ar
                style="width: 100%; height: 100vh; margin: auto;">
            </model-viewer>
        </div>
        <div class="vto-container">
            <a-scene id="vto-scene" mindar-face="autoStart: false;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" style="height: 100%; width: 100%;">
              <a-assets>
                  <a-asset-item id="readingGlasses" src="assets/readingglasses-white.glb"></a-asset-item>
                  <a-asset-item id="manGlasses" src="assets/manglasses-white.glb"></a-asset-item>
                  <a-asset-item id="sportGlasses" src="assets/sportglasses-white.glb"></a-asset-item>
                  <a-asset-item id="sunGlasses" src="assets/sunglasses-white.glb"></a-asset-item>
                  <a-asset-item id="womanGlasses" src="assets/womanglasses-white.glb"></a-asset-item>
              </a-assets>
              <a-camera active="false" position="0 0 0"></a-camera>
              <a-entity mindar-face-target="anchorIndex: 168">
                <a-gltf-model rotation="0 0 0" position="0 0 -0.28" scale="0.25 0.25 0.25" src="#readingGlasses" class="readingGlasses-entity" visible="false"></a-gltf-model>
              </a-entity>
              <a-entity mindar-face-target="anchorIndex: 168">
                  <a-gltf-model rotation="0 0 0" position="0 0.06 -0.28" scale="0.27 0.27 0.27" src="#manGlasses" class="manGlasses-entity" visible="false"></a-gltf-model>
              </a-entity>
              <a-entity mindar-face-target="anchorIndex: 168">
                  <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.28 0.28 0.28" src="#sportGlasses" class="sportGlasses-entity" visible="false"></a-gltf-model>
              </a-entity>
              <a-entity mindar-face-target="anchorIndex: 168">
                  <a-gltf-model rotation="0 0 0" position="0 -0.05 -0.1" scale="0.28 0.28 0.28" src="#sunGlasses" class="sunGlasses-entity" visible="false"></a-gltf-model>
              </a-entity>
              <a-entity mindar-face-target="anchorIndex: 168">
                  <a-gltf-model rotation="0 0 0" position="0 0 -0.3" scale="0.29 0.29 0.29" src="#womanGlasses" class="womanGlasses-entity" visible="false"></a-gltf-model>
              </a-entity>
            </a-scene>
        </div>
    </div>

    <div class="btn-container">
        <button id="btn-ar">Virtual Try-On</button>
        <button id="btn-3d">3D View</button>
    </div>

    <script src="js/products.js"></script>
    <script src="js/detail.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</body>
</html>
